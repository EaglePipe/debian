[colors]
background = #000000
background-alt = #2f363d
foreground = #d0d7de
primary = #CE6600
secondary = #539bf5
alert = #D29922
disabled = #4e5b55
border = #0f2923

[tray-base]
tray-position = right
tray-spacing = 4px
tray-size = 20px
tray-scale = 1.0

[bar/intern]
inherit = tray-base
width = 100%
height = 24pt
radius = 6
monitor = eDP-1
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = Roboto Mono Nerd Font:size=12.5:weight=medium;3
font-1 = Noto Color Emoji:size=10;3
font-2 = Hack Nerd Font:size=12;3
font-3 = FontAwesome:size=12;3

modules-left = memory cpu filesystem bat2 backlight pulseaudio battery weather
modules-center = xworkspaces
modules-right = wlan lock tray date hour


cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/backlight]
type = internal/xbacklight
enable-scroll = false
format-prefix = "ÔÉę "
format-prefix-foreground = ${colors.primary}
format = <label>
label = %percentage%%

[module/battery]
type = internal/battery

full-at = 99
low-at = 5

battery = BAT0
adapter = AC

poll-interval = 5
time-format = %H:%M

format-charging-font = 2
format-charging-prefix = "ÔČÄ "
format-charging-prefix-foreground = ${colors.primary}
format-charging = <label-charging>

format-discharging-font = 2
format-discharging-prefix = "ÔČÄ "
format-discharging-prefix-foreground = ${colors.primary}
format-discharging = <label-discharging>

format-full = <ramp-capacity> <label-full>
format-low = <label-low> <animation-low>

label-charging = "%{A1:kitty -e btop:} > %percentage%%{A} %"
label-discharging = "%{A1:kitty -e btop:} < %percentage%%{A} %"
label-full = BAT FULL
label-low = BAT LOW

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

bar-capacity-width = 10

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750

animation-discharging-0 = ÔČÄ
animation-discharging-1 = ÔČĀ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČÉ
animation-discharging-4 = ÔČĄ
animation-discharging-framerate = 500

animation-low-0 = !
animation-low-1 =
animation-low-framerate = 200

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty =
label-empty-foreground = ${colors.disabled}
label-empty-padding = 0

[module/xwindow]
type = internal/xwindow
label = %title:0:75:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /
format-mounted-prefix = "ÔáÄ "
format-mounted-prefix-foreground = ${colors.primary}
format-mounted = <label-mounted>
label-mounted = "%{A1:kitty -e btop:} %percentage_used%%{A} %"

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-font = 2
format-volume-prefix = "ÔÄ® "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/lock]
type = internal/xkeyboard
format-margin = 2
blacklist-0 = num lock
blacklist-1 = scroll lock
format = <label-indicator>
label-indicator-padding = 1
indicator-icon-0 = caps lock;-CL;+CL
label-indicator-off =
label-indicator-on = " ÔÄ£ Caps "
format-foreground = ${colors.background}
format-background = ${colors.alert}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
label = "%{A1:kitty -e btop:} %percentage_used:2%%{A} %"

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ÔÉ§ "
format-prefix-foreground = ${colors.primary}
label = "%{A1:kitty -e btop:} %percentage:2%%{A} %"

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
format-connected-prefix = "Ôáę "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/hour]
type = internal/date
interval = 5
label-foreground = ${colors.foreground}
date = %H:%M
label = %date%
label-padding = 0
label-font = 1

[module/qsync]
type = custom/text
content = " "

[module/date]
type = custom/script
interval = 5
label-foreground = ${colors.disabled}
format = <label>
exec = date "+%a, %-d. %b %Y"
label-padding = 0
label-font = 1
click-left = flatpak run eu.betterbird.Betterbird -calendar

[module/bat2]
type = custom/script
interval = 1
format-prefix = "ÔÉę "
format-prefix-foreground = ${colors.primary}
label-foreground = ${colors.foreground}
format = <label> %
exec = "~/Dokumente/V-IT/scripts/bat.sh"
label-padding = 0
label-font = 1

[module/weather]
type = custom/script
exec = ~/.config/polybar/wetter.sh
interval = 900
click-left = kitty --class=weatherpopup -e ~/.config/polybar/wetter-popup.sh

;==========================================================
; Evolution-Mail-Modul
;==========================================================
[module/evolution]
type = custom/script
exec = ~/.config/polybar/evo-mails.sh
interval = 4
format = <label>
format-font = 0
click-left = evolution
;==========================================================
[bar/qsync]
width = 200
height = 24
background = #111
foreground = #fff
bottom = true
tray-position = right
tray-padding = 2
tray-maxsize = 20
tray-background = #111



[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

[bar/extern]
inherit = tray-base
width = 100%
height = 24pt
radius = 6
monitor = DP-1-3.2
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = Roboto Mono Nerd Font:size=12.5:weight=medium;3
font-1 = Noto Color Emoji:size=10;3
font-2 = Hack Nerd Font:size=12;3
font-3 = FontAwesome:size=12;3

modules-left = memory cpu filesystem bat2 backlight pulseaudio battery weather
modules-center = xworkspaces
modules-right = eth lock tray date hour evolution 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true


